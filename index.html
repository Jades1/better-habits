<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Better Habits</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f1115" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Habits" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="vendor/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #2a2f3a;
    --text: #e7e9ee;
    --muted: #8a90a0;
    --accent: #5b8cff;
    --good: #3ecf8e;
    --warn: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 24px 20px 8px;
    max-width: 760px;
    margin: 0 auto;
  }
  h1 { font-size: 24px; margin: 0; letter-spacing: -0.5px; }
  .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
  main { max-width: 760px; margin: 0 auto; padding: 12px 20px 80px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-top: 16px;
  }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 0 0 12px; }
  .habit {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    background: var(--panel-2);
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .habit:last-child { margin-bottom: 0; }
  .check {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 2px solid var(--line);
    flex-shrink: 0;
    cursor: pointer;
    display: grid; place-items: center;
    background: transparent;
    transition: all 0.15s;
  }
  .check.done { background: var(--good); border-color: var(--good); }
  .check.done::after { content: "✓"; color: #07120c; font-weight: 700; font-size: 16px; }
  .habit-name { flex: 1; font-size: 16px; }
  .habit-name.done { color: var(--muted); text-decoration: line-through; }
  .streak { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .streak b { color: var(--accent); }
  .streak .at { color: var(--good); }
  .iconbtn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; line-height: 1; }
  .iconbtn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 6px; }
  .del:hover { color: var(--warn); background: rgba(255,107,107,0.1); }
  .name-edit { flex: 1; background: var(--bg); border: 1px solid var(--accent); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 16px; outline: none; }
  .habit-detail { padding: 4px 12px 14px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 320px; }
  .grid .cell { aspect-ratio: 1; border-radius: 5px; background: var(--bg); border: 1px solid var(--line); cursor: pointer; transition: transform 0.08s; }
  .grid .cell:hover { transform: scale(1.12); }
  .grid .cell.on { background: var(--good); border-color: var(--good); }
  .grid .cell.future { opacity: 0.25; cursor: default; }
  .grid-caption { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .footer { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
  button.ghost { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); padding: 8px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; }
  button.ghost:hover { color: var(--text); border-color: var(--accent); }
  .add-row { display: flex; gap: 8px; margin-top: 12px; }
  input[type=text] {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:hover { filter: brightness(1.08); }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 20px 0; }
  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat {
    flex: 1; min-width: 120px;
    background: var(--panel-2);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  canvas { margin-top: 8px; }
  .date-nav { display: flex; align-items: center; gap: 12px; }
  .date-nav button { background: var(--panel-2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; }
  .date-nav .label { flex: 1; text-align: center; font-size: 14px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>🌱 Better Habits</h1>
  <div class="sub">One day at a time.</div>
</header>
<main>
  <div class="card">
    <h2>Daily Check-in</h2>
    <div class="date-nav">
      <button id="prevDay">‹</button>
      <div class="label" id="dateLabel"></div>
      <button id="nextDay">›</button>
    </div>
    <div id="habitList" style="margin-top:12px"></div>
    <div class="add-row">
      <input type="text" id="newHabit" placeholder="Add a habit (e.g. Screens off by 10:30)" />
      <button class="primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="card">
    <h2>Stats</h2>
    <div class="stat-row">
      <div class="stat"><div class="num" id="statToday">0%</div><div class="lbl">Today done</div></div>
      <div class="stat"><div class="num" id="statBest">0</div><div class="lbl">Best streak</div></div>
      <div class="stat"><div class="num" id="stat30">0%</div><div class="lbl">Last 30 days</div></div>
      <div class="stat"><div class="num" id="statAvg">—</div><div class="lbl">Avg check-in</div></div>
    </div>
    <canvas id="chart" height="140"></canvas>
  </div>

  <div class="footer">
    <button class="ghost" id="exportBtn">⬇ Export backup</button>
    <button class="ghost" id="importBtn">⬆ Import backup</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" />
  </div>
</main>

<script>
const STORE_KEY = "betterHabits.v1";
let state = load();
let viewDate = todayStr();

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { habits: [] }; }
  catch { return { habits: [] }; }
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function todayStr(d = new Date()) {
  return d.toISOString().slice(0, 10);
}
function shiftDate(str, days) {
  const d = new Date(str + "T00:00:00");
  d.setDate(d.getDate() + days);
  return todayStr(d);
}
function prettyDate(str) {
  const d = new Date(str + "T00:00:00");
  if (str === todayStr()) return "Today";
  if (str === shiftDate(todayStr(), -1)) return "Yesterday";
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

function uid() { return Math.random().toString(36).slice(2, 9); }

const expanded = new Set();   // ids of habits whose history grid is open

function addHabit(name) {
  name = name.trim();
  if (!name) return;
  state.habits.push({ id: uid(), name, log: {} });
  save(); render();
}
function deleteHabit(id) {
  state.habits = state.habits.filter(h => h.id !== id);
  expanded.delete(id);
  save(); render();
}
function renameHabit(id, name) {
  const h = state.habits.find(x => x.id === id);
  name = (name || "").trim();
  if (h && name) { h.name = name; save(); }
  render();
}
function toggle(id, dateStr) {
  const h = state.habits.find(x => x.id === id);
  if (!h) return;
  // store the moment of check-off (ISO timestamp) so we get daily timing data.
  // legacy entries may be `true`; both are treated as "done".
  if (h.log[dateStr]) delete h.log[dateStr];
  else h.log[dateStr] = new Date().toISOString();
  save(); render();
}

// format a log value's time-of-day, e.g. "10:14 PM"; null for legacy/empty
function checkTime(val) {
  if (!val || val === true) return null;
  const d = new Date(val);
  return isNaN(d) ? null : d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

// average check-in time-of-day across all timestamped entries, as "h:mm AM/PM"
function avgCheckInTime() {
  let sum = 0, count = 0;
  for (const h of state.habits) {
    for (const v of Object.values(h.log)) {
      if (v && v !== true) {
        const d = new Date(v);
        if (!isNaN(d)) { sum += d.getHours() * 60 + d.getMinutes(); count++; }
      }
    }
  }
  if (!count) return "—";
  const avg = Math.round(sum / count);
  const dd = new Date(); dd.setHours(Math.floor(avg / 60), avg % 60, 0, 0);
  return dd.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

// current streak ending at viewDate (counts consecutive done days up to that date)
function currentStreak(h, endStr) {
  let count = 0, cur = endStr;
  while (h.log[cur]) { count++; cur = shiftDate(cur, -1); }
  return count;
}
function bestStreakAll() {
  let best = 0;
  for (const h of state.habits) {
    const days = Object.keys(h.log).sort();
    let run = 0, prev = null;
    for (const d of days) {
      if (prev && shiftDate(prev, 1) === d) run++; else run = 1;
      best = Math.max(best, run);
      prev = d;
    }
  }
  return best;
}

function render() {
  document.getElementById("dateLabel").textContent = prettyDate(viewDate);
  const list = document.getElementById("habitList");
  list.innerHTML = "";
  if (state.habits.length === 0) {
    list.innerHTML = '<div class="empty">No habits yet. Add one below to get started.</div>';
  }
  for (const h of state.habits) {
    const done = !!h.log[viewDate];
    const streak = currentStreak(h, viewDate);
    const isOpen = expanded.has(h.id);
    const time = checkTime(h.log[viewDate]);
    const row = document.createElement("div");
    row.className = "habit";
    row.innerHTML = `
      <div class="check ${done ? "done" : ""}" data-id="${h.id}"></div>
      <div class="habit-name ${done ? "done" : ""}">${escapeHtml(h.name)}</div>
      <div class="streak">${time ? `<span class="at">✓ ${time}</span> ` : ""}${streak > 0 ? `🔥 <b>${streak}</b>` : ""}</div>
      <button class="iconbtn" data-edit="${h.id}" title="Rename">✎</button>
      <button class="iconbtn" data-expand="${h.id}" title="History">${isOpen ? "▾" : "▸"}</button>
      <button class="del" data-del="${h.id}" title="Delete">×</button>
    `;
    list.appendChild(row);
    if (isOpen) list.appendChild(renderDetail(h));
  }
  renderStats();
}

// 28-day history grid for one habit
function renderDetail(h) {
  const wrap = document.createElement("div");
  wrap.className = "habit-detail";
  let cells = "";
  const today = todayStr();
  for (let i = 27; i >= 0; i--) {
    const d = shiftDate(today, -i);
    const on = h.log[d] ? "on" : "";
    const t = checkTime(h.log[d]);
    cells += `<div class="cell ${on}" data-cell="${h.id}" data-date="${d}" title="${d}${t ? " · " + t : ""}"></div>`;
  }
  wrap.innerHTML = `<div class="grid-caption">Last 28 days — click to toggle</div><div class="grid">${cells}</div>`;
  return wrap;
}

function renderStats() {
  const today = todayStr();
  const n = state.habits.length;
  const doneToday = state.habits.filter(h => h.log[today]).length;
  document.getElementById("statToday").textContent = n ? Math.round(100 * doneToday / n) + "%" : "0%";
  document.getElementById("statBest").textContent = bestStreakAll();

  // last 30 days completion rate + chart data
  const labels = [], data = [];
  let totalPossible = 0, totalDone = 0;
  for (let i = 29; i >= 0; i--) {
    const d = shiftDate(today, -i);
    const done = state.habits.filter(h => h.log[d]).length;
    const pct = n ? Math.round(100 * done / n) : 0;
    labels.push(new Date(d + "T00:00:00").toLocaleDateString(undefined, { month: "numeric", day: "numeric" }));
    data.push(pct);
    totalPossible += n; totalDone += done;
  }
  document.getElementById("stat30").textContent = totalPossible ? Math.round(100 * totalDone / totalPossible) + "%" : "0%";
  document.getElementById("statAvg").textContent = avgCheckInTime();
  drawChart(labels, data);
}

let chart;
function drawChart(labels, data) {
  const ctx = document.getElementById("chart");
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels, datasets: [{ data, backgroundColor: "#5b8cff", borderRadius: 4, maxBarThickness: 14 }] },
    options: {
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + "% done" } } },
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { color: "#8a90a0", callback: v => v + "%" }, grid: { color: "#2a2f3a" } },
        x: { ticks: { color: "#8a90a0", maxTicksLimit: 8 }, grid: { display: false } }
      }
    }
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// events
document.getElementById("addBtn").onclick = () => {
  const inp = document.getElementById("newHabit");
  addHabit(inp.value); inp.value = ""; inp.focus();
};
document.getElementById("newHabit").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("addBtn").click();
});
document.getElementById("prevDay").onclick = () => { viewDate = shiftDate(viewDate, -1); render(); };
document.getElementById("nextDay").onclick = () => {
  if (viewDate < todayStr()) { viewDate = shiftDate(viewDate, 1); render(); }
};
document.getElementById("habitList").addEventListener("click", e => {
  const check = e.target.closest(".check");
  if (check) return toggle(check.dataset.id, viewDate);

  const cell = e.target.closest(".cell");
  if (cell && cell.dataset.date <= todayStr()) return toggle(cell.dataset.cell, cell.dataset.date);

  const exp = e.target.closest("[data-expand]");
  if (exp) {
    const id = exp.dataset.expand;
    expanded.has(id) ? expanded.delete(id) : expanded.add(id);
    return render();
  }

  const edit = e.target.closest("[data-edit]");
  if (edit) return startRename(edit.dataset.edit);

  const del = e.target.closest(".del");
  if (del && confirm("Delete this habit and its history?")) deleteHabit(del.dataset.del);
});

// inline rename: swap the name label for an input
function startRename(id) {
  const h = state.habits.find(x => x.id === id);
  if (!h) return;
  const row = [...document.querySelectorAll(".habit-name")]
    .find(el => el.previousElementSibling?.dataset.id === id);
  if (!row) return;
  const input = document.createElement("input");
  input.type = "text";
  input.className = "name-edit";
  input.value = h.name;
  row.replaceWith(input);
  input.focus();
  input.select();
  const commit = () => renameHabit(id, input.value);
  input.addEventListener("keydown", ev => {
    if (ev.key === "Enter") commit();
    if (ev.key === "Escape") render();
  });
  input.addEventListener("blur", commit);
}

// export / import backup
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `better-habits-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.habits)) throw new Error("Not a Better Habits backup");
      if (confirm("Replace your current data with this backup?")) {
        state = data; save(); render();
      }
    } catch (err) { alert("Couldn't import: " + err.message); }
    e.target.value = "";
  };
  reader.readAsText(file);
});

render();

// register service worker for offline / installable app (no-op on file://)
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
